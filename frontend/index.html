<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GloBlog</title>

    <!-- Apply theme instantly before React loads -->
    <script>
      (function() {
        const theme = localStorage.getItem("theme") || "light"; 
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

  </head>
  <body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-gray-200 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
